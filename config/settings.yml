plugins:
  api_sports_enabled:
    default: true
    client: true
  api_sports_api_key:
    default: ""
    client: true
    secret: true
  api_sports_theme:
    default: "dark"
    client: true
    type: enum
    choices:
      - dark
      - light
  api_sports_widget_refresh:
    default: 60
    client: true
    type: integer
    min: 30
    max: 3600
  api_sports_default_league_id:
    default: ""
    client: true
  api_sports_default_team_id:
    default: ""
    client: true
  api_sports_default_season:
    default: "2025"
    client: true
  api_sports_cache_duration:
    default: 300
    client: false
    type: integer
    min: 60
    max: 3600
